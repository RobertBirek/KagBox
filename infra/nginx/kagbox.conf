server {
    listen 443 ssl http2;
    server_name kagbox.example.com;

    ssl_certificate     /etc/ssl/certs/kagbox.crt;
    ssl_certificate_key /etc/ssl/private/kagbox.key;

    # Dashboard
    location / {
        proxy_pass http://localhost:3410;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP auth proxy
    location /mcp {
        proxy_pass http://localhost:3401;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Zdrowie
    location /health {
        proxy_pass http://localhost:3410/api/status;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/kagbox-access.log;
    error_log  /var/log/nginx/kagbox-error.log;
}

server {
    listen 80;
    server_name kagbox.example.com;
    return 301 https://$host$request_uri;
}
